# Quick start with PostgreSQL:
#   docker compose up --build
#
# Quick start with SQLite (no postgres needed):
#   DATABASE_URL=sqlite:///./metal_ai.db docker compose up --build --scale postgres=0
#
# To start only backend+frontend without postgres:
#   docker compose up backend frontend

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://metal:metal@postgres:5432/metal_ai}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # NEXT_PUBLIC_* vars must be passed at build time — Next.js inlines them into the bundle.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: metal_ai
      POSTGRES_USER: metal
      POSTGRES_PASSWORD: metal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metal -d metal_ai"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
